<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>DeepSeek Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #f5f6fa;
            --sidebar-bg: #ffffff;
            --main-bg: #ffffff;
            --chat-bg: #f7f7f8;
            --text: #202124;
            --muted: #6b7280;
            --border: #e5e7eb;
            --user-bg: #1a73e8;
            --user-text: #ffffff;
            --ai-bg: #ffffff;
            --code-bg: #f6f8fa;
            --button-bg: #1a73e8;
            --button-hover: #1558b0;
            --shadow: rgba(0, 0, 0, 0.08);
            --active-bg: #eef4ff;
        }

        html[data-theme="dark"] {
            --bg: #111827;
            --sidebar-bg: #111827;
            --main-bg: #0f172a;
            --chat-bg: #0f172a;
            --text: #f9fafb;
            --muted: #9ca3af;
            --border: #374151;
            --user-bg: #2563eb;
            --user-text: #ffffff;
            --ai-bg: #1f2937;
            --code-bg: #111827;
            --button-bg: #2563eb;
            --button-hover: #1d4ed8;
            --shadow: rgba(0, 0, 0, 0.25);
            --active-bg: #1e3a8a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .version {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            background: var(--button-bg);
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .new-chat-btn:hover {
            background: var(--button-hover);
        }

        .session-title {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .session-item {
            border: 1px solid var(--border);
            background: var(--main-bg);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
        }

        .session-item:hover {
            background: var(--chat-bg);
        }

        .session-item.active {
            background: var(--active-bg);
            border-color: var(--button-bg);
        }

        .session-info {
            overflow: hidden;
            flex: 1;
        }

        .session-name {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .delete-session {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .delete-session:hover {
            color: #ef4444;
        }

        .side-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .side-btn {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--main-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 15px;
        }

        .side-btn:hover {
            background: var(--chat-bg);
        }

        .danger-btn {
            color: #ef4444;
        }

        .chat-main {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
        }

        .chat-header {
            height: 64px;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--main-bg);
        }

        .chat-title {
            font-size: 18px;
            font-weight: bold;
        }

        .chat-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .status {
            font-size: 13px;
            color: var(--muted);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .empty-state {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--muted);
            text-align: center;
        }

        .empty-state h2 {
            margin-bottom: 8px;
            color: var(--text);
        }

        .message-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.user .avatar {
            order: 2;
            background: var(--user-bg);
            color: white;
        }

        .message-row.user .bubble {
            order: 1;
            background: var(--user-bg);
            color: var(--user-text);
            border: none;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 74%;
            padding: 13px 16px;
            border-radius: 16px;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            box-shadow: 0 3px 10px var(--shadow);
            line-height: 1.75;
            word-break: break-word;
        }

        .content p {
            margin: 8px 0;
        }

        .content ul,
        .content ol {
            padding-left: 24px;
        }

        .content pre {
            background: var(--code-bg);
            padding: 14px;
            border-radius: 10px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .content code {
            font-family: Consolas, Monaco, monospace;
            font-size: 14px;
        }

        .content :not(pre) > code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 5px;
            border: 1px solid var(--border);
        }

        .time {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .message-row.user .time {
            color: rgba(255, 255, 255, 0.75);
        }

        .composer {
            padding: 18px 24px 24px;
            background: var(--main-bg);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--main-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 4px 16px var(--shadow);
        }

        textarea {
            flex: 1;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            max-height: 160px;
            padding: 8px;
            font-family: inherit;
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 12px;
            background: var(--button-bg);
            color: white;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--button-hover);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .tips {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 800px) {
            .sidebar {
                display: none;
            }

            .chat-header {
                padding: 0 16px;
            }

            #chat-box {
                padding: 16px;
            }

            .bubble {
                max-width: 86%;
            }

            .composer {
                padding: 14px;
            }
        }
    .knowledge-panel {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.knowledge-title {
    font-size: 14px;
    color: var(--muted);
}

.document-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 160px;
    overflow-y: auto;
}

.document-item {
    border: 1px solid var(--border);
    background: var(--main-bg);
    border-radius: 10px;
    padding: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.document-info {
    overflow: hidden;
    flex: 1;
}

.document-name {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.document-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
}

.delete-document {
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
}

.delete-document:hover {
    color: #ef4444;
}

.empty-document {
    font-size: 12px;
    color: var(--muted);
}
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div>
            <div class="logo">DeepSeek Chat</div>
            <div class="version">v1.6 多会话版</div>
        </div>

        <button class="new-chat-btn" onclick="createNewSession()">+ 新建会话</button>

        <div class="session-title">会话列表</div>
        <div class="session-list" id="session-list"></div>
        <div class="knowledge-panel">
    <div class="knowledge-title">知识库文档</div>

    <input
        type="file"
        id="document-file"
        accept=".txt,.md"
        style="display: none;"
        onchange="uploadDocument()"
    >

    <button class="side-btn" onclick="document.getElementById('document-file').click()">
        上传 txt / md
    </button>

    <div class="document-list" id="document-list"></div>
</div>

        <div class="side-actions">
            <button class="side-btn" id="theme-btn" onclick="toggleTheme()">切换深色模式</button>
            <button class="side-btn danger-btn" onclick="clearChat()">清空当前会话</button>
        </div>
    </aside>

    <main class="chat-main">
        <header class="chat-header">
            <div>
                <div class="chat-title" id="current-session-title">我的 AI 聊天助手</div>
                <div class="chat-subtitle">基于 Flask + DeepSeek API</div>
            </div>
            <div class="status" id="status">就绪</div>
        </header>

        <div id="chat-box"></div>

        <div class="composer">
            <div class="input-wrapper">
                <textarea id="user-input" rows="1" placeholder="请输入你的问题..."></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
            </div>
            <div class="tips">Enter 发送，Shift + Enter 换行</div>
        </div>
    </main>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const statusText = document.getElementById("status");
const themeBtn = document.getElementById("theme-btn");
const sessionList = document.getElementById("session-list");
const currentSessionTitle = document.getElementById("current-session-title");
const documentList = document.getElementById("document-list");

let currentSessionId = null;
let sessions = [];
let documents = [];

    function updateStatus(text) {
        statusText.textContent = text;
    }

    function currentTime() {
        return new Date().toLocaleString();
    }

    function renderMarkdown(content) {
        const rawHtml = marked.parse(content || "");
        return DOMPurify.sanitize(rawHtml);
    }

    function highlightCode(scope) {
        if (window.hljs) {
            scope.querySelectorAll("pre code").forEach((block) => {
                hljs.highlightElement(block);
            });
        }
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showEmptyState() {
        chatBox.innerHTML = `
            <div class="empty-state" id="empty-state">
                <h2>开启一个新会话</h2>
                <p>可以问我 Python、AI 项目、代码报错、学习规划等问题。</p>
            </div>
        `;
    }

    function removeEmptyState() {
        const empty = document.getElementById("empty-state");
        if (empty) {
            empty.remove();
        }
    }

    function addMessage(role, content, createdAt = "", options = {}) {
        removeEmptyState();

        const renderNow = options.renderMarkdownNow !== false;

        const row = document.createElement("div");
        row.className = `message-row ${role === "user" ? "user" : "assistant"}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "你" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const contentDiv = document.createElement("div");
        contentDiv.className = "content";

        if (role === "assistant" && renderNow) {
            contentDiv.innerHTML = renderMarkdown(content);
        } else {
            contentDiv.textContent = content;
        }

        bubble.appendChild(contentDiv);

        if (createdAt) {
            const timeDiv = document.createElement("div");
            timeDiv.className = "time";
            timeDiv.textContent = createdAt;
            bubble.appendChild(timeDiv);
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatBox.appendChild(row);

        highlightCode(bubble);
        scrollToBottom();

        return {
            row,
            bubble,
            contentDiv
        };
    }

    function renderSessions() {
        sessionList.innerHTML = "";

        sessions.forEach(session => {
            const item = document.createElement("div");
            item.className = "session-item";

            if (session.id === currentSessionId) {
                item.classList.add("active");
            }

            item.onclick = () => switchSession(session.id);

            const info = document.createElement("div");
            info.className = "session-info";

            const name = document.createElement("div");
            name.className = "session-name";
            name.textContent = session.title || "新会话";

            const meta = document.createElement("div");
            meta.className = "session-meta";
            meta.textContent = `${session.message_count || 0} 条消息`;

            info.appendChild(name);
            info.appendChild(meta);

            const delBtn = document.createElement("button");
            delBtn.className = "delete-session";
            delBtn.textContent = "×";
            delBtn.title = "删除会话";
            delBtn.onclick = (event) => {
                event.stopPropagation();
                deleteSession(session.id);
            };

            item.appendChild(info);
            item.appendChild(delBtn);
            sessionList.appendChild(item);
        });

        const current = sessions.find(s => s.id === currentSessionId);

        if (current) {
            currentSessionTitle.textContent = current.title || "新会话";
        }
    }

    async function loadSessions() {
        const response = await fetch("/api/sessions");
        const data = await response.json();

        sessions = data.sessions || [];

        if (!currentSessionId) {
            currentSessionId = data.current_session_id;
        }

        const exists = sessions.some(s => s.id === currentSessionId);

        if (!exists && sessions.length > 0) {
            currentSessionId = sessions[0].id;
        }

        renderSessions();
    }

    async function loadHistory(sessionId = currentSessionId) {
        if (!sessionId) {
            showEmptyState();
            return;
        }

        try {
            const response = await fetch(`/api/history?session_id=${sessionId}`);
            const data = await response.json();

            currentSessionId = data.session_id;
            chatBox.innerHTML = "";

            if (!data.messages || data.messages.length === 0) {
                showEmptyState();
                updateStatus("当前会话为空");
                return;
            }

            data.messages.forEach(msg => {
                addMessage(msg.role, msg.content, msg.created_at);
            });

            updateStatus("历史记录已加载");

        } catch (error) {
            showEmptyState();
            updateStatus("历史记录加载失败");
        }
    }

    async function createNewSession() {
        try {
            const response = await fetch("/api/sessions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    title: "新会话"
                })
            });

            const data = await response.json();

            currentSessionId = data.session.id;

            await loadSessions();
            await loadHistory(currentSessionId);

            updateStatus("新会话已创建");

        } catch (error) {
            alert("新建会话失败：" + error.message);
        }
    }

    async function switchSession(sessionId) {
        if (sessionId === currentSessionId) {
            return;
        }

        currentSessionId = sessionId;
        renderSessions();
        await loadHistory(currentSessionId);
        updateStatus("已切换会话");
    }

    async function deleteSession(sessionId) {
        const ok = confirm("确定要删除这个会话吗？");

        if (!ok) {
            return;
        }

        try {
            const response = await fetch(`/api/sessions/${sessionId}`, {
                method: "DELETE"
            });

            const data = await response.json();

            sessions = data.sessions || [];
            currentSessionId = data.current_session_id;

            renderSessions();
            await loadHistory(currentSessionId);

            updateStatus("会话已删除");

        } catch (error) {
            alert("删除失败：" + error.message);
        }
    }

    async function sendMessage() {
        const message = input.value.trim();

        if (!message) {
            return;
        }

        if (!currentSessionId) {
            await loadSessions();
        }

        addMessage("user", message, currentTime());

        input.value = "";
        input.style.height = "auto";
        sendBtn.disabled = true;
        updateStatus("AI 正在回复...");

        const aiMessage = addMessage("assistant", "", currentTime(), {
            renderMarkdownNow: false
        });

        let fullText = "";

        try {
            const response = await fetch("/api/chat/stream", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    session_id: currentSessionId
                })
            });

            if (!response.ok) {
                throw new Error("请求失败，状态码：" + response.status);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            while (true) {
                const { value, done } = await reader.read();

                if (done) {
                    break;
                }

                const chunk = decoder.decode(value, { stream: true });
                fullText += chunk;

                aiMessage.contentDiv.textContent = fullText;
                scrollToBottom();
            }

            if (fullText.trim()) {
                aiMessage.contentDiv.innerHTML = renderMarkdown(fullText);
                highlightCode(aiMessage.bubble);
            } else {
                aiMessage.contentDiv.textContent = "没有收到 AI 回复。";
            }

            await loadSessions();
            updateStatus("回复完成");

        } catch (error) {
            aiMessage.contentDiv.textContent = "请求失败：" + error.message;
            updateStatus("请求失败");
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }

    async function loadDocuments() {
    try {
        const response = await fetch("/api/documents");
        const data = await response.json();

        documents = data.documents || [];
        renderDocuments();

    } catch (error) {
        console.error("文档列表加载失败：", error);
    }
}

function renderDocuments() {
    documentList.innerHTML = "";

    if (!documents || documents.length === 0) {
        documentList.innerHTML = `<div class="empty-document">暂无文档</div>`;
        return;
    }

    documents.forEach(doc => {
        const item = document.createElement("div");
        item.className = "document-item";

        const info = document.createElement("div");
        info.className = "document-info";

        const name = document.createElement("div");
        name.className = "document-name";
        name.textContent = doc.filename;

        const meta = document.createElement("div");
        meta.className = "document-meta";
        meta.textContent = doc.created_at || "";

        info.appendChild(name);
        info.appendChild(meta);

        const delBtn = document.createElement("button");
        delBtn.className = "delete-document";
        delBtn.textContent = "×";
        delBtn.title = "删除文档";

        delBtn.onclick = () => {
            deleteDocument(doc.id);
        };

        item.appendChild(info);
        item.appendChild(delBtn);
        documentList.appendChild(item);
    });
}

async function uploadDocument() {
    const fileInput = document.getElementById("document-file");
    const file = fileInput.files[0];

    if (!file) {
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    updateStatus("正在上传文档...");

    try {
        const response = await fetch("/api/documents/upload", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (!response.ok) {
            alert(data.error || "上传失败");
            updateStatus("文档上传失败");
            return;
        }

        fileInput.value = "";

        await loadDocuments();

        updateStatus("文档上传成功");

    } catch (error) {
        alert("上传失败：" + error.message);
        updateStatus("文档上传失败");
    }
}

async function deleteDocument(documentId) {
    const ok = confirm("确定要删除这个文档吗？");

    if (!ok) {
        return;
    }

    try {
        await fetch(`/api/documents/${documentId}`, {
            method: "DELETE"
        });

        await loadDocuments();

        updateStatus("文档已删除");

    } catch (error) {
        alert("删除失败：" + error.message);
    }
}
    async function clearChat() {
        const ok = confirm("确定要清空当前会话的聊天记录吗？");

        if (!ok) {
            return;
        }

        try {
            await fetch("/api/clear", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    session_id: currentSessionId
                })
            });

            showEmptyState();
            await loadSessions();

            updateStatus("当前会话已清空");

        } catch (error) {
            alert("清空失败：" + error.message);
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const nextTheme = currentTheme === "dark" ? "light" : "dark";

        document.documentElement.setAttribute("data-theme", nextTheme);
        localStorage.setItem("theme", nextTheme);

        themeBtn.textContent = nextTheme === "dark" ? "切换浅色模式" : "切换深色模式";
    }

    function initThemeButton() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        themeBtn.textContent = currentTheme === "dark" ? "切换浅色模式" : "切换深色模式";
    }

    input.addEventListener("keydown", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    input.addEventListener("input", function() {
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";
    });

    async function initApp() {
    initThemeButton();
    await loadSessions();
    await loadHistory(currentSessionId);
    await loadDocuments();
}

    initApp();
</script>

</body>
</html>
