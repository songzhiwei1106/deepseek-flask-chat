<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>DeepSeek Flask Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #f3f4f6;
            --sidebar-bg: #ffffff;
            --main-bg: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --user-bubble: #2563eb;
            --user-text: #ffffff;
            --ai-bubble: #f3f4f6;
            --ai-text: #111827;
            --danger: #ef4444;
            --input-bg: #ffffff;
            --shadow: rgba(15, 23, 42, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #0f172a;
            --sidebar-bg: #111827;
            --main-bg: #020617;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #1f2937;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --user-bubble: #2563eb;
            --user-text: #ffffff;
            --ai-bubble: #111827;
            --ai-text: #e5e7eb;
            --danger: #f87171;
            --input-bg: #111827;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        .app {
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
        }

        .version {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .side-btn {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--main-bg);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 12px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
        }

        .side-btn:hover {
            border-color: var(--primary);
        }

        .side-btn.primary {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            text-align: center;
        }

        .side-btn.primary:hover {
            background: var(--primary-hover);
        }

        .session-title,
        .knowledge-title {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px;
        }

        .session-list,
        .document-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .session-item,
        .document-item {
            border: 1px solid var(--border);
            background: var(--main-bg);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-item:hover,
        .document-item:hover {
            border-color: var(--primary);
        }

        .session-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .session-info,
        .document-info {
            flex: 1;
            overflow: hidden;
        }

        .session-name,
        .document-name {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta,
        .document-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .delete-session,
        .delete-document {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        .delete-session:hover,
        .delete-document:hover {
            color: var(--danger);
        }

        .knowledge-panel {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .empty-document,
        .empty-session {
            font-size: 12px;
            color: var(--muted);
        }

        .side-actions {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            background: var(--main-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 700;
        }

        .status {
            font-size: 12px;
            color: var(--muted);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--muted);
            line-height: 1.8;
        }

        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .message-row.user .avatar {
            background: var(--primary);
            color: #ffffff;
        }

        .message-row.assistant .avatar {
            background: var(--ai-bubble);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .bubble {
            max-width: min(760px, 78%);
            border-radius: 16px;
            padding: 12px 14px;
            line-height: 1.7;
            font-size: 15px;
            word-break: break-word;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .message-row.user .bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-top-right-radius: 4px;
        }

        .message-row.assistant .bubble {
            background: var(--ai-bubble);
            color: var(--ai-text);
            border-top-left-radius: 4px;
        }

        .bubble pre {
            overflow-x: auto;
            padding: 12px;
            border-radius: 10px;
            background: #0f172a;
            color: #e5e7eb;
        }

        .bubble code {
            font-family: Consolas, Monaco, monospace;
        }

        .time {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }

        .composer {
            border-top: 1px solid var(--border);
            background: var(--main-bg);
            padding: 14px 22px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 980px;
            margin: 0 auto;
        }

        textarea {
            flex: 1;
            resize: none;
            min-height: 46px;
            max-height: 150px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            font-size: 15px;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .send-btn {
            border: none;
            background: var(--primary);
            color: #ffffff;
            border-radius: 14px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 15px;
        }

        .send-btn:hover {
            background: var(--primary-hover);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .document-modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .document-modal-mask.show {
            display: flex;
        }

        .document-modal {
            width: min(900px, 95vw);
            height: min(700px, 85vh);
            background: var(--main-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .document-modal-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .document-modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .document-modal-meta {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
        }

        .document-modal-close {
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 26px;
            cursor: pointer;
        }

        .document-modal-close:hover {
            color: var(--danger);
        }

        .document-preview-content {
            flex: 1;
            overflow: auto;
            padding: 18px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.7;
            background: var(--main-bg);
            color: var(--text);
        }

        @media (max-width: 800px) {
            .sidebar {
                width: 240px;
            }

            .bubble {
                max-width: 86%;
            }
        }
    </style>
</head>

<body>
<div class="app">
    <aside class="sidebar">
        <div>
            <div class="brand">DeepSeek Chat</div>
            <div class="version">v2.2 文档预览调试版</div>
        </div>

        <button class="side-btn primary" onclick="createNewSession()">+ 新建会话</button>

        <div class="session-title">会话列表</div>
        <div class="session-list" id="session-list"></div>

        <div class="knowledge-panel">
            <div class="knowledge-title">知识库文档</div>

            <input
                type="file"
                id="document-file"
                accept=".txt,.md,.pdf"
                style="display: none;"
                onchange="uploadDocument()"
            >

            <button class="side-btn" onclick="document.getElementById('document-file').click()">
                上传 txt / md / pdf
            </button>

            <div class="document-list" id="document-list"></div>
        </div>

        <div class="side-actions">
            <button class="side-btn" id="theme-btn" onclick="toggleTheme()">切换深色模式</button>
            <button class="side-btn" onclick="clearChat()">清空当前会话</button>
        </div>
    </aside>

    <main class="chat-main">
        <header class="chat-header">
            <div>
                <div class="chat-title" id="current-session-title">当前会话</div>
                <div class="status" id="status">就绪</div>
            </div>
        </header>

        <div id="chat-box"></div>

        <div class="composer">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="输入你的问题，Enter 发送，Shift + Enter 换行"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </main>
</div>

<div class="document-modal-mask" id="document-modal-mask" onclick="closeDocumentPreview()">
    <div class="document-modal" onclick="event.stopPropagation()">
        <div class="document-modal-header">
            <div>
                <div class="document-modal-title" id="document-preview-title">文档预览</div>
                <div class="document-modal-meta" id="document-preview-meta"></div>
            </div>

            <button class="document-modal-close" onclick="closeDocumentPreview()">×</button>
        </div>

        <pre class="document-preview-content" id="document-preview-content"></pre>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusText = document.getElementById("status");
    const themeBtn = document.getElementById("theme-btn");
    const sessionList = document.getElementById("session-list");
    const currentSessionTitle = document.getElementById("current-session-title");
    const documentList = document.getElementById("document-list");

    let currentSessionId = null;
    let sessions = [];
    let documents = [];

    function updateStatus(text) {
        statusText.textContent = text;
    }

    function renderMarkdown(content) {
        if (!window.marked || !window.DOMPurify) {
            return content || "";
        }

        const rawHtml = marked.parse(content || "");
        return DOMPurify.sanitize(rawHtml);
    }

    function highlightCode(scope) {
        if (window.hljs) {
            scope.querySelectorAll("pre code").forEach((block) => {
                hljs.highlightElement(block);
            });
        }
    }

    function showEmptyState() {
        chatBox.innerHTML = `
            <div class="empty-state">
                <div>当前会话暂无消息</div>
                <div>你可以直接提问，也可以先上传 txt / md / pdf 文档后进行知识库问答。</div>
            </div>
        `;
    }

    function addMessage(role, content, createdAt = "") {
        const oldEmpty = chatBox.querySelector(".empty-state");
        if (oldEmpty) {
            oldEmpty.remove();
        }

        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "我" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const contentDiv = document.createElement("div");

        if (role === "assistant") {
            contentDiv.innerHTML = renderMarkdown(content);
        } else {
            contentDiv.textContent = content;
        }

        bubble.appendChild(contentDiv);

        if (createdAt) {
            const time = document.createElement("div");
            time.className = "time";
            time.textContent = createdAt;
            bubble.appendChild(time);
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatBox.appendChild(row);

        if (role === "assistant") {
            highlightCode(contentDiv);
        }

        chatBox.scrollTop = chatBox.scrollHeight;

        return contentDiv;
    }

    function renderSessions() {
        sessionList.innerHTML = "";

        if (!sessions || sessions.length === 0) {
            sessionList.innerHTML = `<div class="empty-session">暂无会话</div>`;
            return;
        }

        sessions.forEach(session => {
            const item = document.createElement("div");
            item.className = "session-item";

            if (session.id === currentSessionId) {
                item.classList.add("active");
            }

            item.onclick = () => {
                switchSession(session.id);
            };

            const info = document.createElement("div");
            info.className = "session-info";

            const name = document.createElement("div");
            name.className = "session-name";
            name.textContent = session.title;

            const meta = document.createElement("div");
            meta.className = "session-meta";
            meta.textContent = `${session.message_count || 0} 条消息`;

            info.appendChild(name);
            info.appendChild(meta);

            const delBtn = document.createElement("button");
            delBtn.className = "delete-session";
            delBtn.textContent = "×";
            delBtn.title = "删除会话";

            delBtn.onclick = (event) => {
                event.stopPropagation();
                deleteSession(session.id);
            };

            item.appendChild(info);
            item.appendChild(delBtn);

            sessionList.appendChild(item);
        });

        const current = sessions.find(s => s.id === currentSessionId);
        currentSessionTitle.textContent = current ? current.title : "当前会话";
    }

    async function loadSessions() {
        const response = await fetch("/api/sessions");
        const data = await response.json();

        sessions = data.sessions || [];

        if (!currentSessionId) {
            currentSessionId = data.current_session_id;
        }

        renderSessions();
    }

    async function createNewSession() {
        const response = await fetch("/api/sessions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: "新会话"
            })
        });

        const data = await response.json();

        currentSessionId = data.session.id;

        await loadSessions();
        await loadHistory(currentSessionId);

        updateStatus("新会话已创建");
    }

    async function switchSession(sessionId) {
        if (sessionId === currentSessionId) {
            return;
        }

        currentSessionId = sessionId;
        renderSessions();
        await loadHistory(currentSessionId);

        updateStatus("已切换会话");
    }

    async function deleteSession(sessionId) {
        const ok = confirm("确定要删除这个会话吗？");

        if (!ok) {
            return;
        }

        const response = await fetch(`/api/sessions/${sessionId}`, {
            method: "DELETE"
        });

        const data = await response.json();

        sessions = data.sessions || [];
        currentSessionId = data.current_session_id;

        renderSessions();
        await loadHistory(currentSessionId);

        updateStatus("会话已删除");
    }

    async function loadHistory(sessionId = currentSessionId) {
        if (!sessionId) {
            showEmptyState();
            return;
        }

        const response = await fetch(`/api/history?session_id=${sessionId}`);
        const data = await response.json();

        chatBox.innerHTML = "";

        const messages = data.messages || [];

        if (messages.length === 0) {
            showEmptyState();
            return;
        }

        messages.forEach(msg => {
            addMessage(msg.role, msg.content, msg.created_at);
        });
    }

    async function loadDocuments() {
        try {
            const response = await fetch("/api/documents");
            const data = await response.json();

            documents = data.documents || [];
            renderDocuments();

        } catch (error) {
            console.error("文档列表加载失败：", error);
        }
    }

    function renderDocuments() {
        documentList.innerHTML = "";

        if (!documents || documents.length === 0) {
            documentList.innerHTML = `<div class="empty-document">暂无文档</div>`;
            return;
        }

        documents.forEach(doc => {
            const item = document.createElement("div");
            item.className = "document-item";

            item.onclick = () => {
                previewDocument(doc.id);
            };

            const info = document.createElement("div");
            info.className = "document-info";

            const name = document.createElement("div");
            name.className = "document-name";
            name.textContent = doc.filename;

            const meta = document.createElement("div");
            meta.className = "document-meta";
            meta.textContent = doc.created_at || "";

            info.appendChild(name);
            info.appendChild(meta);

            const delBtn = document.createElement("button");
            delBtn.className = "delete-document";
            delBtn.textContent = "×";
            delBtn.title = "删除文档";

            delBtn.onclick = (event) => {
                event.stopPropagation();
                deleteDocument(doc.id);
            };

            item.appendChild(info);
            item.appendChild(delBtn);
            documentList.appendChild(item);
        });
    }

    async function uploadDocument() {
        const fileInput = document.getElementById("document-file");
        const file = fileInput.files[0];

        if (!file) {
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        updateStatus("正在上传文档...");

        try {
            const response = await fetch("/api/documents/upload", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.error || "上传失败");
                updateStatus("文档上传失败");
                return;
            }

            fileInput.value = "";

            await loadDocuments();

            updateStatus("文档上传成功");

        } catch (error) {
            alert("上传失败：" + error.message);
            updateStatus("文档上传失败");
        }
    }

    async function previewDocument(documentId) {
        try {
            updateStatus("正在加载文档内容...");

            const response = await fetch(`/api/documents/${documentId}`);
            const data = await response.json();

            if (!response.ok) {
                alert(data.error || "文档加载失败");
                updateStatus("文档加载失败");
                return;
            }

            const modalMask = document.getElementById("document-modal-mask");
            const title = document.getElementById("document-preview-title");
            const meta = document.getElementById("document-preview-meta");
            const content = document.getElementById("document-preview-content");

            title.textContent = data.filename;

            let metaText = `上传时间：${data.created_at || ""} | 提取字符数：${data.content_length}`;

            if (data.is_truncated) {
                metaText += " | 当前仅显示前 12000 字";
            }

            meta.textContent = metaText;

            content.textContent = data.content || "该文档没有提取到可预览内容。";

            modalMask.classList.add("show");

            updateStatus("文档内容已加载");

        } catch (error) {
            alert("文档预览失败：" + error.message);
            updateStatus("文档预览失败");
        }
    }

    function closeDocumentPreview() {
        const modalMask = document.getElementById("document-modal-mask");
        modalMask.classList.remove("show");
    }

    async function deleteDocument(documentId) {
        const ok = confirm("确定要删除这个文档吗？");

        if (!ok) {
            return;
        }

        try {
            await fetch(`/api/documents/${documentId}`, {
                method: "DELETE"
            });

            await loadDocuments();

            updateStatus("文档已删除");

        } catch (error) {
            alert("删除失败：" + error.message);
        }
    }

    async function clearChat() {
        const ok = confirm("确定要清空当前会话吗？");

        if (!ok) {
            return;
        }

        await fetch("/api/clear", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                session_id: currentSessionId
            })
        });

        chatBox.innerHTML = "";
        showEmptyState();

        await loadSessions();

        updateStatus("当前会话已清空");
    }

    async function sendMessage() {
        const message = input.value.trim();

        if (!message) {
            return;
        }

        input.value = "";
        input.style.height = "46px";

        addMessage("user", message);

        sendBtn.disabled = true;
        updateStatus("AI 正在回复...");

        const assistantContentDiv = addMessage("assistant", "");

        try {
            const response = await fetch("/api/chat/stream", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    session_id: currentSessionId
                })
            });

            if (!response.ok) {
                assistantContentDiv.textContent = "请求失败，状态码：" + response.status;
                updateStatus("请求失败");
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            let fullText = "";

            while (true) {
                const { value, done } = await reader.read();

                if (done) {
                    break;
                }

                const chunk = decoder.decode(value, { stream: true });
                fullText += chunk;
                assistantContentDiv.textContent = fullText;
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            assistantContentDiv.innerHTML = renderMarkdown(fullText);
            highlightCode(assistantContentDiv);

            await loadSessions();

            updateStatus("回复完成");

        } catch (error) {
            assistantContentDiv.textContent = "请求失败：" + error.message;
            updateStatus("请求失败");
        } finally {
            sendBtn.disabled = false;
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const nextTheme = currentTheme === "dark" ? "light" : "dark";

        document.documentElement.setAttribute("data-theme", nextTheme);
        localStorage.setItem("theme", nextTheme);

        initThemeButton();
    }

    function initThemeButton() {
        const theme = document.documentElement.getAttribute("data-theme");

        if (theme === "dark") {
            themeBtn.textContent = "切换浅色模式";
        } else {
            themeBtn.textContent = "切换深色模式";
        }
    }

    input.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    input.addEventListener("input", function () {
        input.style.height = "46px";
        input.style.height = Math.min(input.scrollHeight, 150) + "px";
    });

    document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
            closeDocumentPreview();
        }
    });

    async function initApp() {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);

        initThemeButton();

        await loadSessions();
        await loadHistory(currentSessionId);
        await loadDocuments();

        updateStatus("就绪");
    }

    initApp();
</script>
</body>
</html>
