<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的 DeepSeek 聊天助手</title>

    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 防止 HTML 注入的安全库 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 850px;
            margin: 40px auto;
            background: white;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        #chat-box {
            height: 460px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 16px;
            border-radius: 10px;
            background: #fafafa;
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 14px;
            line-height: 1.7;
        }

        .user-message {
            background: #e8f0fe;
            padding: 10px 14px;
            border-radius: 10px;
        }

        .ai-message {
            background: #f1f3f4;
            padding: 10px 14px;
            border-radius: 10px;
        }

        .role {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .content {
            word-break: break-word;
        }

        .content p {
            margin: 8px 0;
        }

        .content ul,
        .content ol {
            padding-left: 24px;
        }

        .content pre {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .content code {
            font-family: Consolas, Monaco, monospace;
        }

        .content :not(pre) > code {
            background: #eee;
            padding: 2px 5px;
            border-radius: 4px;
        }

        .time {
            font-size: 12px;
            color: #777;
            margin-top: 6px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 22px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #1a73e8;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1558b0;
        }

        .clear-btn {
            background: #777;
        }

        .clear-btn:hover {
            background: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>我的 DeepSeek 聊天助手</h1>

    <div id="chat-box"></div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="请输入你的问题">
        <button onclick="sendMessage()">发送</button>
        <button class="clear-btn" onclick="clearChat()">清空</button>
    </div>
</div>

<script>
    function renderMarkdown(content) {
        const rawHtml = marked.parse(content);
        return DOMPurify.sanitize(rawHtml);
    }

    function addMessage(role, content, createdAt = "") {
        const chatBox = document.getElementById("chat-box");

        const messageDiv = document.createElement("div");
        messageDiv.className = "message";

        if (role === "user") {
            messageDiv.classList.add("user-message");
            messageDiv.innerHTML = `<div class="role">你：</div>`;
        } else {
            messageDiv.classList.add("ai-message");
            messageDiv.innerHTML = `<div class="role">AI：</div>`;
        }

        const contentDiv = document.createElement("div");
        contentDiv.className = "content";

        if (role === "assistant") {
            contentDiv.innerHTML = renderMarkdown(content);
        } else {
            contentDiv.textContent = content;
        }

        messageDiv.appendChild(contentDiv);

        if (createdAt) {
            const timeDiv = document.createElement("div");
            timeDiv.className = "time";
            timeDiv.textContent = createdAt;
            messageDiv.appendChild(timeDiv);
        }

        chatBox.appendChild(messageDiv);

       if (window.hljs) {
    messageDiv.querySelectorAll("pre code").forEach((block) => {
        hljs.highlightElement(block);
    });
}

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function loadHistory() {
        const response = await fetch("/api/history");
        const data = await response.json();

        const chatBox = document.getElementById("chat-box");
        chatBox.innerHTML = "";

        data.messages.forEach(msg => {
            addMessage(msg.role, msg.content, msg.created_at);
        });
    }

    async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();

    if (!message) {
        alert("请输入内容");
        return;
    }

    addMessage("user", message);
    input.value = "";

    const chatBox = document.getElementById("chat-box");

    const messageDiv = document.createElement("div");
    messageDiv.className = "message ai-message";
    messageDiv.innerHTML = `<div class="role">AI：</div>`;

    const contentDiv = document.createElement("div");
    contentDiv.className = "content";
    contentDiv.textContent = "";

    messageDiv.appendChild(contentDiv);
    chatBox.appendChild(messageDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/api/chat/stream", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        let fullText = "";

        while (true) {
            const { value, done } = await reader.read();

            if (done) {
                break;
            }

            const chunk = decoder.decode(value, { stream: true });
            fullText += chunk;

            contentDiv.textContent = fullText;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        contentDiv.innerHTML = renderMarkdown(fullText);

        messageDiv.querySelectorAll("pre code").forEach((block) => {
            if (window.hljs) {
                hljs.highlightElement(block);
            }
        });

    } catch (error) {
        contentDiv.textContent = "请求失败：" + error;
    }
}

    async function clearChat() {
        await fetch("/api/clear", {
            method: "POST"
        });

        document.getElementById("chat-box").innerHTML = "";
    }

    document.getElementById("user-input").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    window.onload = loadHistory;
</script>

</body>
</html>
